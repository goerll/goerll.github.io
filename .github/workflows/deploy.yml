name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' '${{ secrets.DEPLOY_KEY_B64 }}' | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Trust server host key
        run: ssh-keyscan -H 91.98.232.237 >> ~/.ssh/known_hosts

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Deploy
        run: rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" --rsync-path='mkdir -p /var/www/goerll/build && rsync' build/ projects@91.98.232.237:/var/www/goerll/build/
